# Databases for the integration test suite: Postgres (5433), MariaDB (3307),
# and MySQL (3308). See docs/TESTING_LOCALLY.md for how to run the suite.
#
# Storage is tmpfs, so each run starts against a clean server; the host ports
# are offset to avoid clashing with a locally installed database.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 3s
      retries: 15

  mariadb:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    tmpfs:
      - /var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 2s
      timeout: 3s
      retries: 15

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3308:3306"
    tmpfs:
      - /var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot", "--silent"]
      interval: 3s
      timeout: 5s
      retries: 40
